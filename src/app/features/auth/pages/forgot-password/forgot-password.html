<div class="auth-page">
  <div class="page-container auth-page__container">
    <section class="auth-layout auth-layout--single">
      <div class="auth-card">
        <div class="auth-card__header">
          <h2>Recuperar contraseña</h2>
          <p>Introduce tu correo y te enviaremos instrucciones para restablecerla.</p>
        </div>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
          <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input
              id="email"
              class="app-input"
              type="email"
              formControlName="email"
              placeholder="Introduce tu correo"
            />
          </div>

          @if (errorMessage) {
            <div class="form-message form-message--error">
              {{ errorMessage }}
            </div>
          }

          <button class="app-btn app-btn--primary auth-submit" type="submit" [disabled]="loading">
            @if (!loading) {
              Enviar instrucciones
            } @else {
              Enviando...
            }
          </button>
        </form>

        <div class="auth-card__footer">
          <a routerLink="/auth/login">Volver al login</a>
        </div>
      </div>
    </section>
  </div>
</div>
