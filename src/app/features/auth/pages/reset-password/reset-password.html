<div class="auth-page">
  <div class="page-container auth-page__container">
    <section class="auth-layout auth-layout--single">
      <div class="auth-card">
        <div class="auth-card__header">
          <h2>Restablecer contraseña</h2>
          <p>Introduce el correo, el token y tu nueva contraseña.</p>
        </div>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
          <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input id="email" class="app-input" type="email" formControlName="email" />
          </div>

          <div class="form-group">
            <label for="token">Token</label>
            <input id="token" class="app-input" type="text" formControlName="token" />
          </div>

          <div class="form-group">
            <label for="password">Nueva contraseña</label>
            <input id="password" class="app-input" type="password" formControlName="password" />
          </div>

          <div class="form-group">
            <label for="password_confirmation">Confirmar nueva contraseña</label>
            <input id="password_confirmation" class="app-input" type="password" formControlName="password_confirmation" />
          </div>

          @if (errorMessage) {
            <div class="form-message form-message--error">
              {{ errorMessage }}
            </div>
          }

          <button class="app-btn app-btn--primary auth-submit" type="submit" [disabled]="loading">
            @if (!loading) {
              Restablecer contraseña
            } @else {
              Procesando...
            }
          </button>
        </form>

        <div class="auth-card__footer">
          <a routerLink="/auth/login">Volver al login</a>
        </div>
      </div>
    </section>
  </div>
</div>
