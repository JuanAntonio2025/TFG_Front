<main class="checkout-result-page">
  <div class="page-container">
    <div class="breadcrumb">
      <a routerLink="/">Inicio</a> > <a routerLink="/cart">Carrito</a> > <span>Pago cancelado</span>
    </div>

    <section class="checkout-result-card section-card cancel">
      <div class="checkout-result-icon">!</div>
      <h1 class="page-title">Pago cancelado</h1>
      <p class="page-subtitle">
        Has cancelado el proceso de pago en Stripe.
      </p>

      <p class="checkout-result-text">
        No se ha realizado ningún cargo. Puedes volver al carrito e intentarlo de nuevo cuando quieras.
      </p>

      <div class="checkout-result-actions">
        <a class="app-btn app-btn--primary" routerLink="/checkout">Volver al checkout</a>
        <a class="app-btn app-btn--secondary" routerLink="/cart">Volver al carrito</a>
      </div>
    </section>
  </div>
</main>
