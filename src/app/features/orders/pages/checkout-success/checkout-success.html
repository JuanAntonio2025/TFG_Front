<main class="checkout-result-page">
  <div class="page-container">
    <div class="breadcrumb">
      <a routerLink="/">Inicio</a> > <a routerLink="/cart">Carrito</a> > <span>Pago completado</span>
    </div>

    <section class="checkout-result-card section-card success">
      <div class="checkout-result-icon">✓</div>
      <h1 class="page-title">Pago completado</h1>
      <p class="page-subtitle">
        El pago se ha realizado correctamente en Stripe. Tu pedido se está procesando.
      </p>

      <p class="checkout-result-text">
        En unos instantes, los libros comprados deberían aparecer en tu biblioteca digital.
      </p>

      <div class="checkout-result-actions">
        <a class="app-btn app-btn--primary" routerLink="/library">Ir a mi biblioteca</a>
        <a class="app-btn app-btn--secondary" routerLink="/orders">Ver mis pedidos</a>
      </div>
    </section>
  </div>
</main>
